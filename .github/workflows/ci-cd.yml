# ============================================
# GitHub Actions CI/CD Pipeline
# AetherDesk Call Center Platform
# ============================================
name: AetherDesk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: aetherdesk
  GKE_CLUSTER: aetherdesk-cluster
  GKE_REGION: us-east1
  REGISTRY: gcr.io

jobs:
  # ============================================
  # Linting and Type Checking
  # ============================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check apps/
      - name: Format check with Ruff
        run: ruff format --check apps/

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-ui/package-lock.json
      - name: Install dependencies
        working-directory: agent-ui
        run: npm ci
      - name: TypeScript type check
        working-directory: agent-ui
        run: npx tsc --noEmit
      - name: ESLint
        working-directory: agent-ui
        run: npx eslint . --ext .js,.jsx,.ts,.tsx
      - name: Build check
        working-directory: agent-ui
        run: npm run build

  frontend-test:
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent-ui/package-lock.json
      - name: Install dependencies
        working-directory: agent-ui
        run: npm ci
      - name: Run frontend tests
        working-directory: agent-ui
        run: npx jest --coverage

  # ============================================
  # Dependency and Secret Scanning
  # ============================================
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install safety
        run: pip install safety
      - name: Scan dependencies for vulnerabilities
        run: safety check -r requirements.txt --continue-on-error
        continue-on-error: true
      - name: Check for .env committed
        run: |
          if git ls-files | grep -q '.env$'; then
            echo "ERROR: .env file is committed!"; exit 1
          fi
          echo "No .env file in tracking — OK"

  # ============================================
  # Python Tests
  # ============================================
  test:
    runs-on: ubuntu-latest
    needs: [lint, security-scan, frontend-lint, frontend-test]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov bandit
      - name: Run unit and service tests (no ML deps)
        run: |
          python -m pytest tests/unit/ tests/services/ tests/test_db_refactor.py tests/test_health.py tests/test_verification.py -v --tb=short --cov-fail-under=37 -k "not e2e_ml" --ignore=tests/e2e --ignore=tests/ai --ignore=tests/chaos --ignore=tests/cognitive --ignore=tests/integration
        env:
          USE_POSTGRES: "false"
      - name: Bandit security scan
        run: |
          bandit -r apps/ -f json -o bandit_results.json || true

  # ============================================
  # HTTP Load Test (staging deploy gate)
  # ============================================
  loadtest:
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install httpx
      - name: Start API server
        run: |
          uvicorn apps.api.main:app --host 127.0.0.1 --port 8000 --log-level warning &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/v1/health
        env:
          JWT_SECRET: ci-test-secret
          ENCRYPTION_KEY: rqSRQd2JssHG3nhORTRC3CBaeUjqOqZ3D2BH2FX0l0k=
          USE_POSTGRES: "false"
      - name: Run HTTP Load Test
        run: |
          python tests/load_test_api.py -c 20 -n 200 -u http://127.0.0.1:8000 --max-failure-rate 20 2>&1
        env:
          JWT_SECRET: ci-test-secret
          ENCRYPTION_KEY: rqSRQd2JssHG3nhORTRC3CBaeUjqOqZ3D2BH2FX0l0k=

  # ============================================
  # Build Docker Images
  # ============================================
  build:
    runs-on: ubuntu-latest
    needs: [test, loadtest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Container Registry
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/aetherdesk-api:${{ github.sha }}
            gcr.io/${{ env.PROJECT_ID }}/aetherdesk-api:latest

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: agent-ui/Dockerfile
          push: true
          tags: |
            gcr.io/${{ env.PROJECT_ID }}/aetherdesk-ui:${{ github.sha }}
            gcr.io/${{ env.PROJECT_ID }}/aetherdesk-ui:latest

  # ============================================
  # Deploy to Staging (develop branch)
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ env.PROJECT_ID }}
      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/aetherdesk-api \
            api=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-api:${{ github.sha }} \
            -n aetherdesk-staging
          kubectl set image deployment/aetherdesk-agent-ui \
            agent-ui=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-ui:${{ github.sha }} \
            -n aetherdesk-staging
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/aetherdesk-api -n aetherdesk-staging --timeout=300s
          kubectl rollout status deployment/aetherdesk-agent-ui -n aetherdesk-staging --timeout=300s

  # ============================================
  # Deploy to Production (main branch)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/aetherdesk-api \
            api=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-api:${{ github.sha }} \
            -n aetherdesk
          kubectl set image deployment/aetherdesk-agent-ui \
            agent-ui=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-ui:${{ github.sha }} \
            -n aetherdesk
          kubectl annotate deployment/aetherdesk-api \
            kubernetes.io/change-cause="deploy ${{ github.sha }} by ${{ github.actor }}" \
            -n aetherdesk
          kubectl annotate deployment/aetherdesk-agent-ui \
            kubernetes.io/change-cause="deploy ${{ github.sha }} by ${{ github.actor }}" \
            -n aetherdesk

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/aetherdesk-api -n aetherdesk --timeout=300s
          kubectl rollout status deployment/aetherdesk-agent-ui -n aetherdesk --timeout=300s

      - name: Store deploy metadata for rollback
        run: |
          echo "LAST_DEPLOYED_IMAGE=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-api:${{ github.sha }}" >> deploy-metadata.txt
          echo "LAST_DEPLOYED_UI_IMAGE=gcr.io/${{ env.PROJECT_ID }}/aetherdesk-ui:${{ github.sha }}" >> deploy-metadata.txt