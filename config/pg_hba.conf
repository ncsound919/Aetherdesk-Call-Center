# AetherDesk PostgreSQL Client Authentication — HIPAA/GDPR compliant
# Local database administrative login via Unix socket
local   all             postgres                                peer

# TYPE  DATABASE        USER                    ADDRESS                 METHOD

# AetherDesk API connections from docker network (encrypted)
hostssl aetherdesk      aetherdesk_admin        172.20.0.0/16           scram-sha-256
hostssl aetherdesk      aetherdesk_admin        ::1/128                 scram-sha-256

# Fonoster Voice Server connections
hostssl aetherdesk      aetherdesk_fonoster     172.20.0.0/16           scram-sha-256

# Health check connections (no database, from localhost only)
host    aetherdesk      aetherdesk_admin         127.0.0.1/32            scram-sha-256

# Reject all other connections for security
hostssl all             all                     0.0.0.0/0               reject
host    all             all                     0.0.0.0/0               reject
