# ============================================
# AetherDesk Call Center - SSL/TLS Configuration
# HIPAA/GDPR Compliant TLS Configuration
# ============================================

# ============================================
# Certificate Manager (cert-manager) Configuration
# ============================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aetherdesk-letsencrypt
  namespace: aetherdesk
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@overlay365.com
    privateKeySecretRef:
      name: aetherdesk-letsencrypt-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ============================================
# SSL Certificates for API
# ============================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: aetherdesk-api-cert
  namespace: aetherdesk
spec:
  secretName: aetherdesk-api-tls
  issuerRef:
    name: aetherdesk-letsencrypt
    kind: ClusterIssuer
  commonName: "api.overlay365.com"
  dnsNames:
    - "api.overlay365.com"
    - "*.overlay365.com"
  duration: 2160h  # 90 days
  renewBefore: 360h  # 15 days before expiry

---
# ============================================
# Ingress with TLS for API
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherdesk-api-ingress
  namespace: aetherdesk
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.overlay365.com
        - app.overlay365.com
      secretName: aetherdesk-api-tls
  rules:
    - host: api.overlay365.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aetherdesk-api
                port:
                  number: 3000

---
# ============================================
# Ingress with TLS for Agent UI
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherdesk-ui-ingress
  namespace: aetherdesk
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.overlay365.com
      secretName: aetherdesk-api-tls
  rules:
    - host: app.overlay365.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aetherdesk-agent-ui
                port:
                  number: 80